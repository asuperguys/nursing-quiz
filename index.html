<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>护理标准在线刷题</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--primary:#1a73e8;--success:#0d904f;--danger:#d93025;--warn:#e37400;--text:#202124;--sub:#5f6368;--border:#dadce0;--hover:#e8f0fe}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%}

/* Top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.topbar .menu-btn{width:36px;height:36px;border:none;background:none;font-size:1.4em;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar .menu-btn:hover{background:var(--hover)}
.topbar .progress-compact{flex:1;font-size:.82em;color:var(--sub);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .mode-select{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.78em;background:var(--card);color:var(--text);flex-shrink:0}

/* Sidebar overlay */
.sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:90;display:none}
.sidebar-overlay.open{display:block}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:280px;max-width:85vw;height:100%;background:var(--card);z-index:100;overflow-y:auto;transform:translateX(-100%);transition:transform .25s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}
.sidebar-inner{padding:12px}
.sidebar h3{font-size:.9em;margin:12px 0 6px;color:var(--sub)}
.sidebar .close-btn{float:right;border:none;background:none;font-size:1.4em;cursor:pointer;padding:4px 8px;border-radius:6px}
.sidebar .close-btn:hover{background:var(--hover)}

/* Sidebar bank tabs */
.sidebar .bank-tabs{display:flex;flex-direction:column;gap:6px}
.sidebar .bank-tab{padding:10px 12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88em;font-weight:500;transition:all .15s}
.sidebar .bank-tab.active{border-color:var(--primary);background:var(--hover);color:var(--primary)}
.sidebar .bank-tab .count{font-size:.72em;color:var(--sub)}
.sidebar .stat{background:var(--bg);padding:6px 10px;border-radius:6px;font-size:.82em}

/* Sidebar filters */
.sidebar .filters{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.sidebar .fbtn{padding:4px 10px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;font-size:.75em;transition:all .15s}
.sidebar .fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Sidebar shuffle button */
.sidebar .shuffle-btn{width:100%;padding:8px;margin:6px 0;border:1.5px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:.85em;text-align:center}

/* Main content */
.container{max-width:900px;margin:0 auto;padding:8px 12px}

/* Question card */
.q-card{background:var(--card);border-radius:12px;padding:18px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.q-num{background:var(--primary);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8em;flex-shrink:0}
.q-type{font-size:.72em;padding:2px 8px;border-radius:10px;font-weight:600}
.q-type.single{background:#e3f2fd;color:#1565c0}
.q-type.multi{background:#fce4ec;color:#c62828}
.q-type.judge{background:#fff3e0;color:#e65100}
.q-type.short{background:#e8f5e9;color:#2e7d32}
.q-source{font-size:.72em;color:var(--sub);margin-left:auto}
.q-text{font-size:1em;font-weight:500;margin-bottom:12px;line-height:1.7}

/* Options */
.options{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;position:relative;word-break:break-word;user-select:none;-webkit-user-select:none}
.opt:hover{border-color:var(--primary);background:var(--hover)}
.opt.selected{border-color:var(--primary);background:rgba(26,115,232,.08)}
.opt.correct{border-color:var(--success);border-left:4px solid var(--success);padding-right:32px}
.opt.correct::after{content:'✓';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--success);font-weight:700;font-size:1.1em}
.opt.wrong{border-color:var(--danger);border-left:4px solid var(--danger);padding-right:32px}
.opt.wrong::after{content:'✗';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--danger);font-weight:700;font-size:1.1em}
.opt .letter{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8em;flex-shrink:0}
.opt.selected .letter{background:var(--primary);color:#fff}
.opt.correct .letter{background:var(--success);color:#fff}
.opt.wrong .letter{background:var(--danger);color:#fff}
.opt .opt-text{flex:1;min-width:0;line-height:1.5}

/* Result */
.result-badge{text-align:center;padding:10px 14px;margin:12px 0 4px;border-radius:8px;font-weight:700;font-size:.95em}
.result-badge.correct-badge{border:2px solid var(--success);color:var(--success)}
.result-badge.wrong-badge{border:2px solid var(--danger);color:var(--danger)}

/* Answer reveal */
.answer-reveal{margin-top:6px;padding:12px 14px;background:#f5faf6;border-radius:10px;border:1px solid #a8d8b9;display:none}
.answer-reveal.show{display:block}
.answer-reveal .ans-label{font-weight:700;color:var(--success);margin-bottom:4px}
.answer-reveal .analysis-text{font-size:.85em;color:#444;line-height:1.7}
.answer-reveal .kp-item{font-size:.85em;color:#444;margin:2px 0;padding-left:10px;border-left:2px solid var(--success)}

/* Short answer */
.ta-wrap{margin:10px 0}
.ta-wrap textarea{width:100%;min-height:100px;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:.9em;resize:vertical;font-family:inherit}
.ta-wrap textarea:focus{outline:none;border-color:var(--primary)}

/* Buttons */
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:.85em;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-outline{background:var(--card);border:2px solid var(--primary);color:var(--primary)}
.btn-success{background:var(--success);color:#fff;font-size:.95em;padding:12px}

/* Navigation */
.nav-row{display:flex;gap:6px;justify-content:center;padding:10px 0;flex-wrap:wrap}
.nav-row .btn{flex:1 1 auto;min-width:50px;text-align:center;font-size:.8em;padding:10px 8px}
.nav-dots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-height:100px;overflow-y:auto;padding:6px 0}
.nav-dot{width:24px;height:24px;border-radius:5px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.6em;display:flex;align-items:center;justify-content:center;min-width:24px}
.nav-dot.current{border-color:var(--primary);background:var(--primary);color:#fff}
.nav-dot.done{border-color:var(--success);background:#e6f4ea}
.nav-dot.wrong-dot{border-color:var(--danger);background:#fce8e6}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.empty .icon{font-size:2.5em;margin-bottom:12px}

/* Mobile */
@media(max-width:768px){
  .container{padding:4px}
  .q-card{padding:14px 10px;border-radius:10px;margin-bottom:10px}
  .q-text{font-size:1.05em;line-height:1.7}
  .opt{padding:14px 12px;gap:10px;font-size:1em;border-radius:10px;min-height:46px}
  .opt.correct,.opt.wrong{padding-right:30px}
  .opt .letter{width:28px;height:28px;font-size:.85em}
  .btn{min-height:42px;font-size:.88em}
  .nav-row .btn{flex:1;min-width:40px;font-size:.78em;padding:10px 6px}
  .nav-dot{width:24px;height:24px;font-size:.58em;min-width:24px}
  .topbar{padding:6px 10px}
  .ta-wrap textarea{font-size:1em;min-height:100px}
}
@media(max-width:400px){
  .q-card{padding:12px 8px}
  .opt{padding:12px 10px;font-size:.95em}
  .opt .letter{width:26px;height:26px;font-size:.8em}
  .nav-dot{width:22px;height:22px;font-size:.55em;min-width:22px}
}

/* Dark mode */
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a2e;--card:#222240;--text:#e0e0e0;--sub:#aaa;--border:#3a3a5a;--hover:#2a2a4a}
  .q-card{box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .answer-reveal{background:#1a2a1a;border-color:#2d5a3d}
  .answer-reveal .analysis-text,.answer-reveal .kp-item{color:#bbb}
  .opt{background:var(--card)}
  .opt .letter{background:#333;color:#ccc}
  .opt.selected{background:rgba(26,115,232,.2)}
  .stat{background:var(--card)}
  .fbtn,.shuffle-btn,.bank-tab{background:var(--card)}
  .nav-dot{background:var(--card)}
  .btn-outline{background:var(--card)}
  .topbar{background:var(--card)}
  .sidebar{background:var(--card)}
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" title="菜单">☰</button>
  <span class="progress-compact" id="topProgress">个人赛 · 0/200</span>
  <select class="mode-select" id="topMode" onchange="viewMode=this.value;renderAll()">
    <option value="practice">练习</option>
    <option value="browse">浏览</option>
  </select>
</div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    <button class="close-btn" onclick="toggleSidebar()">✕</button>
    <h3 style="margin-top:0">📚 题库选择</h3>
    <div class="bank-tabs">
      <div class="bank-tab active" data-bank="gr" onclick="switchBank('gr')">个人赛题库<br><span class="count">4个核心行业标准 · 200题</span></div>
      <div class="bank-tab" data-bank="tt" onclick="switchBank('tt')">团体赛题库<br><span class="count">23个护理团体标准 · 200题</span></div>
    </div>

    <h3>📊 答题统计</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="sideStats">
      <div class="stat">📊 总题: <b id="sTotal">0</b></div>
      <div class="stat">📝 已答: <b id="sDone">0</b></div>
      <div class="stat" style="color:var(--success)">✅ 正确: <b id="sCorrect">0</b></div>
      <div class="stat" style="color:var(--danger)">❌ 错误: <b id="sWrong">0</b></div>
      <div class="stat" style="grid-column:1/-1">🎯 正确率: <b id="sRate">-</b></div>
    </div>

    <h3>🔍 题型筛选</h3>
    <div class="filters" id="sideFilters">
      <button class="fbtn active" data-f="all" onclick="setFilter('all')">全部</button>
      <button class="fbtn" data-f="单选题" onclick="setFilter('单选题')">单选</button>
      <button class="fbtn" data-f="多选题" onclick="setFilter('多选题')">多选</button>
      <button class="fbtn" data-f="判断题" onclick="setFilter('判断题')">判断</button>
      <button class="fbtn" data-f="简答题" onclick="setFilter('简答题')">简答</button>
      <button class="fbtn" data-f="unanswered" onclick="setFilter('unanswered')">未答</button>
      <button class="fbtn" data-f="wrong" onclick="setFilter('wrong')">错题</button>
    </div>

    <button class="shuffle-btn" id="btnShuffle" onclick="toggleShuffle()">🎲 打乱出题</button>
    <button class="shuffle-btn" style="color:var(--danger);border-color:var(--danger);margin-top:4px" onclick="resetProgress()">🔄 重置当前题库进度</button>
  </div>
</div>

<!-- Main content -->
<div class="container">
  <div id="questionArea">
    <div class="empty"><div class="icon">📖</div><p>正在加载题库数据...</p></div>
  </div>
  <div class="nav-dots" id="navDots"></div>
  <div class="nav-row">
    <button class="btn btn-outline" onclick="prevQuestion()">⬅ 上一题</button>
    <button class="btn btn-outline" onclick="nextQuestion()">下一题 ➡</button>
  </div>
</div>

<script>
// ==================== GLOBAL STATE ====================
let currentBank = 'gr';
let allQuestions = { tt: [], gr: [] };
let displayList = [];
let currentIndex = 0;
let filterType = 'all';
let autoNext = false;
let viewMode = 'practice';
let shuffleMode = false;
let bankState = {
  tt: { userAnswers: {}, answeredIds: new Set(), correctIds: new Set(), wrongIds: new Set() },
  gr: { userAnswers: {}, answeredIds: new Set(), correctIds: new Set(), wrongIds: new Set() }
};

function bs() { return bankState[currentBank]; }

// ==================== SIDEBAR ====================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ==================== MD PARSER (server mode) ====================
function parseMarkdown(mdText) {
  const questions = [];
  const blocks = mdText.split(/\n(?=【题号】)/);
  for (const block of blocks) {
    const q = { id: 0, type: '', source: '', question: '', options: [], answer: '', analysis: '', knowledgePoints: [] };
    let m;
    m = block.match(/【题型】\s*(\S+)/); if (m) q.type = m[1];
    m = block.match(/【题号】\s*(\d+)/); if (m) q.id = parseInt(m[1]);
    m = block.match(/【考点来源】\s*(.+?)(?:\n|$)/); if (m) q.source = m[1].replace(/\(.*?页码未提供.*?\)/g, '').trim();
    m = block.match(/【题目】\s*(.+?)(?:\n|$)/); if (m) q.question = m[1].trim();
    const optRegex = /^([A-E])[\.\s、](.+?)$/gm; let om;
    while ((om = optRegex.exec(block)) !== null) q.options.push({ label: om[1], text: om[2].trim() });
    m = block.match(/【答案】\s*(.+?)(?:\n|$)/); if (m) q.answer = m[1].trim();
    m = block.match(/【解析】\s*([\s\S]+?)(?=\n(?:---|$))/);
    if (m) { let a = m[1].trim(); if (a.length > 600) a = a.substring(0, 600) + '...'; q.analysis = a; }
    if (q.type && q.question) questions.push(q);
  }
  const seen = new Set();
  return questions.filter(q => { const k = q.question.substring(0, 40); if (seen.has(k)) return false; seen.add(k); return true; });
}

// ==================== DATA LOADING ====================
function loadBank(){} // no fetch

// ==================== BANK SWITCHING ====================
function switchBank(bankKey) {
  currentBank = bankKey;
  document.querySelectorAll('.bank-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-bank="${bankKey}"]`).classList.add('active');
  filterType = 'all';
  refreshFilterBtns();
  buildDisplayList();
  currentIndex = 0;
  renderAll();
  saveProgress();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ==================== DISPLAY LIST ====================
function buildDisplayList() {
  let list = [...allQuestions[currentBank]];
  if (['单选题', '多选题', '判断题', '简答题'].includes(filterType)) list = list.filter(q => q.type === filterType);
  else if (filterType === 'unanswered') list = list.filter(q => !bs().answeredIds.has(q.id));
  else if (filterType === 'wrong') list = list.filter(q => bs().wrongIds.has(q.id));
  if (shuffleMode) list = [...list].sort(() => Math.random() - 0.5);
  else list.sort((a, b) => a.id - b.id);
  displayList = list;
  updateStats();
}

function setFilter(type) {
  filterType = type;
  refreshFilterBtns();
  buildDisplayList();
  currentIndex = 0;
  renderAll();
}

function refreshFilterBtns() {
  document.querySelectorAll('#sideFilters .fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === filterType));
}

function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('btnShuffle').textContent = shuffleMode ? '📋 顺序出题' : '🎲 打乱出题';
  buildDisplayList();
  currentIndex = 0;
  renderAll();
}

// ==================== STATS ====================
function updateStats() {
  const list = displayList;
  let done = 0, correct = 0, wrong = 0;
  for (const q of list) {
    if (bs().answeredIds.has(q.id)) { done++; if (bs().correctIds.has(q.id)) correct++; if (bs().wrongIds.has(q.id)) wrong++; }
  }
  document.getElementById('sTotal').textContent = list.length;
  document.getElementById('sDone').textContent = done;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sRate').textContent = done > 0 ? Math.round(correct / done * 100) + '%' : '-';
  const bankName = currentBank === 'tt' ? '团体赛' : '个人赛';
  document.getElementById('topProgress').textContent = `${bankName} · ${done}/${list.length}`;
}

// ==================== RENDER ====================
function renderAll() {
  renderQuestion();
  renderDots();
  updateStats();
}

function renderQuestion() {
  const area = document.getElementById('questionArea');
  if (displayList.length === 0) {
    area.innerHTML = '<div class="empty"><div class="icon">📭</div><p>没有匹配的题目</p></div>'; return;
  }
  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex >= displayList.length) currentIndex = displayList.length - 1;

  const q = displayList[currentIndex];
  const ua = bs().userAnswers[q.id];
  const isAnswered = bs().answeredIds.has(q.id);
  const isCorrect = bs().correctIds.has(q.id);
  const isWrong = bs().wrongIds.has(q.id);
  const isBrowse = viewMode === 'browse';

  let html = `<div class="q-card">`;
  let tc = q.type.includes('单选') ? 'single' : q.type.includes('多选') ? 'multi' : q.type.includes('判断') ? 'judge' : 'short';
  html += `<div class="q-header"><div class="q-num">${q.id}</div><span class="q-type ${tc}">${q.type}</span><span class="q-source">${q.source || ''}</span></div>`;
  html += `<div class="q-text">${q.question}</div>`;

  const canSelect = !isAnswered && !isBrowse;
  if (q.options.length > 0 && q.type !== '简答题') {
    html += '<div class="options">';
    for (const opt of q.options) {
      let oc = '';
      if (isAnswered || isBrowse) {
        const cl = q.answer.replace(/\s/g, '').split(/[,，、]/).filter(l => l);
        if (cl.includes(opt.label)) oc = 'correct';
        if (ua && ua.includes(opt.label) && !cl.includes(opt.label)) oc = 'wrong';
      } else if (ua && ua.includes(opt.label)) oc = 'selected';
      html += `<div class="opt ${oc}" onclick="${canSelect ? `selectOption('${opt.label}')` : ''}"><span class="letter">${opt.label}</span><span class="opt-text">${opt.text}</span></div>`;
    }
    html += '</div>';
    if (!isAnswered && !isBrowse && ua) {
      html += `<button class="btn btn-success" style="margin-top:10px;width:100%" onclick="confirmAnswer()">✅ 确认答案，提交判分</button>`;
    }
  }

  if (q.type === '简答题') {
    html += `<div class="ta-wrap"><textarea id="shortAnswer" placeholder="输入你的答案...">${ua || ''}</textarea></div>`;
    html += !isAnswered ? `<button class="btn btn-primary" onclick="submitShortAnswer()">📝 提交简答题</button>` : '';
  }

  if ((isAnswered || isBrowse) && q.type !== '简答题') {
    html += `<div class="answer-reveal show"><div class="ans-label">✅ 正确答案：${q.answer}</div>${q.analysis ? `<div class="analysis-text">📝 ${q.analysis}</div>` : ''}</div>`;
  }
  if ((isAnswered || isBrowse) && q.type === '简答题') {
    html += `<div class="answer-reveal show"><div class="ans-label">📝 参考答案 / 知识要点：</div>${q.knowledgePoints && q.knowledgePoints.length > 0 ? q.knowledgePoints.map(kp => `<div class="kp-item">• ${kp}</div>`).join('') : (q.analysis ? `<div class="analysis-text">${q.analysis}</div>` : '<div>请自行对照标准原文核对</div>')}</div>`;
  }

  if (isAnswered) {
    const bt = isCorrect ? '🎉 回答正确！' : (isWrong ? '😞 回答错误，已显示正确答案' : '📝 已提交，参考答案如下');
    const bc = isCorrect ? 'correct-badge' : (isWrong ? 'wrong-badge' : '');
    html += `<div class="result-badge ${bc}">${bt}</div>`;
  } else if (isBrowse) {
    html += `<div class="result-badge" style="border:2px solid #1a73e8;color:#1a73e8">👀 浏览模式</div>`;
  }

  html += '</div>';
  area.innerHTML = html;
}

// ==================== ANSWER LOGIC ====================
function selectOption(label) {
  const q = displayList[currentIndex];
  if (!q || (bs().answeredIds.has(q.id) && viewMode !== 'browse')) return;
  if (q.type === '单选题' || q.type === '判断题') { bs().userAnswers[q.id] = label; renderQuestion(); }
  else if (q.type === '多选题') {
    let s = (bs().userAnswers[q.id] || '').split('').filter(l => /[A-E]/.test(l));
    const i = s.indexOf(label);
    if (i >= 0) s.splice(i, 1); else s.push(label);
    s.sort(); bs().userAnswers[q.id] = s.join(''); renderQuestion();
  }
}

function confirmAnswer() {
  const q = displayList[currentIndex];
  if (!q || !bs().userAnswers[q.id]) { alert('请先选择一个选项'); return; }
  checkAnswer(q.id);
}

function submitShortAnswer() {
  const q = displayList[currentIndex];
  if (!q || q.type !== '简答题') return;
  const ta = document.getElementById('shortAnswer');
  if (!ta || !ta.value.trim()) { alert('请输入你的答案'); return; }
  bs().userAnswers[q.id] = ta.value.trim();
  checkAnswer(q.id);
}

function checkAnswer(qid) {
  const q = displayList.find(x => x.id === qid);
  if (!q) return;
  const ua = bs().userAnswers[qid] || '';
  let isCorrect = false;
  if (q.type === '单选题' || q.type === '判断题') {
    const correct = q.answer.replace(/\s/g, '');
    isCorrect = (ua === correct || q.answer.includes(ua));
  } else if (q.type === '多选题') {
    const correct = q.answer.replace(/\s/g, '').split(/[,，、]/).filter(l => l).sort().join('');
    const userSel = (ua || '').split('').filter(l => /[A-E]/.test(l)).sort().join('');
    isCorrect = (userSel === correct);
  } else if (q.type === '简答题') {
    bs().answeredIds.add(qid); bs().correctIds.add(qid);
    saveProgress(); renderAll(); return;
  }
  bs().answeredIds.add(qid);
  if (isCorrect) { bs().correctIds.add(qid); bs().wrongIds.delete(qid); }
  else { bs().wrongIds.add(qid); bs().correctIds.delete(qid); }
  saveProgress(); renderAll();
}

// ==================== NAVIGATION ====================
function nextQuestion() { if (currentIndex < displayList.length - 1) { currentIndex++; renderAll(); } }
function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderAll(); } }

function renderDots() {
  const c = document.getElementById('navDots');
  let h = '';
  for (let i = 0; i < displayList.length; i++) {
    const q = displayList[i];
    let cl = '';
    if (i === currentIndex) cl = 'current';
    else if (bs().correctIds.has(q.id)) cl = 'done';
    else if (bs().wrongIds.has(q.id)) cl = 'wrong-dot';
    h += `<button class="nav-dot ${cl}" onclick="goTo(${i})" title="第${q.id}题">${q.id}</button>`;
  }
  c.innerHTML = h;
}

function goTo(idx) { currentIndex = idx; renderAll(); }

// ==================== PERSISTENCE ====================
const QUIZ_VERSION = 3;

function saveProgress() {
  const data = {
    version: QUIZ_VERSION,
    ttState: { answered: Array.from(bankState.tt.answeredIds), correct: Array.from(bankState.tt.correctIds), wrong: Array.from(bankState.tt.wrongIds), answers: bankState.tt.userAnswers },
    grState: { answered: Array.from(bankState.gr.answeredIds), correct: Array.from(bankState.gr.correctIds), wrong: Array.from(bankState.gr.wrongIds), answers: bankState.gr.userAnswers }
  };
  localStorage.setItem('nursing_quiz_progress', JSON.stringify(data));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('nursing_quiz_progress');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.version !== QUIZ_VERSION) { localStorage.removeItem('nursing_quiz_progress'); return; }
    if (data.ttState) { bankState.tt.answeredIds = new Set(data.ttState.answered || []); bankState.tt.correctIds = new Set(data.ttState.correct || []); bankState.tt.wrongIds = new Set(data.ttState.wrong || []); bankState.tt.userAnswers = data.ttState.answers || {}; }
    if (data.grState) { bankState.gr.answeredIds = new Set(data.grState.answered || []); bankState.gr.correctIds = new Set(data.grState.correct || []); bankState.gr.wrongIds = new Set(data.grState.wrong || []); bankState.gr.userAnswers = data.grState.answers || {}; }
  } catch (e) { localStorage.removeItem('nursing_quiz_progress'); }
}

function resetProgress() {
  if (!confirm('确定要重置当前题库的答题进度吗？')) return;
  bankState[currentBank] = { userAnswers: {}, answeredIds: new Set(), correctIds: new Set(), wrongIds: new Set() };
  saveProgress(); buildDisplayList(); currentIndex = 0; renderAll();
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  const q = displayList[currentIndex];
  const k = e.key.toUpperCase();
  if (/^[A-E]$/.test(k) && q && q.options.length > 0 && !bs().answeredIds.has(q.id)) {
    selectOption(k);
    if (q.type === '多选题') return;
  }
  if (e.key === 'ArrowRight' || e.key === 'n') { e.preventDefault(); nextQuestion(); }
  if (e.key === 'ArrowLeft' || e.key === 'p') { e.preventDefault(); prevQuestion(); }
  if (e.key === 'Enter' && !bs().answeredIds.has(q?.id) && bs().userAnswers[q?.id]) { e.preventDefault(); confirmAnswer(); }
});

</script>

l":"B","text":"置管后应通过pH检测和X光片确认位置"},{"label":"C","text":"鼻肠管只包括胃管"},{"label":"D","text":"无需测量可直接置管"},{"label":"E","text":"鼻肠管类型包括螺旋型鼻肠管、三腔喂养管和液囊空肠导管"}],"answer":"ABE","analysis":"A正确：置管长度测量可采用鼻尖-耳垂-剑突下缘；B正确：置管后应通过pH检测和X光片确认位置；C错误：鼻肠管只包括胃管不符合标准；正确依据应为“鼻肠管类型包括螺旋型鼻肠管、三腔喂养管和液囊空肠导管”；D错误：无需测量可直接置管不符合标准；正确依据应为“置管长度测量可采用鼻尖-耳垂-剑突下缘”；E正确：鼻肠管类型包括螺旋型鼻肠管、三腔喂养管和液囊空肠导管。本题综合考察T/CNAS 20-2021中多个核心考点。","knowledgePoints":[]},{"id":85,"type":"多选题","source":"标准7《血管活性药物静脉输注护理》- 血管通路、输注方式、标签标识（提示词核心考点；原文页码未提供）","question":"关于血管活性药物静脉输注护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"血管活性药物宜使用注射泵输注"},{"label":"B","text":"标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度"},{"label":"C","text":"可与普通补液随意共用通路"},{"label":"D","text":"应由患者自行调速"},{"label":"E","text":"血管活性药物应选择单独血管通路，宜选择中心静脉通路"}],"answer":"ABE","analysis":"A正确：血管活性药物宜使用注射泵输注；B正确：标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度；C错误：可与普通补液随意共用通路不符合标准；正确依据应为“血管活性药物应选择单独血管通路，宜选择中心静脉通路”；D错误：应由患者自行调速不符合标准；正确依据应为“血管活性药物宜使用注射泵输注”；E正确：血管活性药物应选择单独血管通路，宜选择中心静脉通路。本题综合考察T/CNAS 22-2021中多个核心考点。","knowledgePoints":[]},{"id":86,"type":"多选题","source":"标准7《血管活性药物静脉输注护理》- 输注方式、标签标识、双泵法（提示词核心考点；原文页码未提供）","question":"关于血管活性药物静脉输注护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"宜使用普通滴壶估算速度"},{"label":"B","text":"标签无需输注速度"},{"label":"C","text":"血管活性药物宜使用注射泵输注"},{"label":"D","text":"标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度"},{"label":"E","text":"体外循环手术、大剂量血管活性药物或血流动力学不稳定时宜使用双泵法续泵"}],"answer":"CDE","analysis":"A错误：宜使用普通滴壶估算速度不符合标准；正确依据应为“血管活性药物宜使用注射泵输注”；B错误：标签无需输注速度不符合标准；正确依据应为“标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度”；C正确：血管活性药物宜使用注射泵输注；D正确：标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度；E正确：体外循环手术、大剂量血管活性药物或血流动力学不稳定时宜使用双泵法续泵。本题综合考察T/CNAS 22-2021中多个核心考点。","knowledgePoints":[]},{"id":87,"type":"多选题","source":"标准8《胰岛素皮下注射》- 专人专用、剂量核对、储存要求（提示词核心考点；原文页码未提供）","question":"关于胰岛素皮下注射的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"注射装置可多人共用"},{"label":"B","text":"无需核对剂量"},{"label":"C","text":"胰岛素注射装置应专人专用，针头及注射器一次性使用"},{"label":"D","text":"胰岛素注射前应双人核对注射剂量"},{"label":"E","text":"未启封胰岛素应2℃-8℃保存，已启封应15℃-30℃室温保存且有效期30天"}],"answer":"CDE","analysis":"A错误：注射装置可多人共用不符合标准；正确依据应为“胰岛素注射装置应专人专用，针头及注射器一次性使用”；B错误：无需核对剂量不符合标准；正确依据应为“胰岛素注射前应双人核对注射剂量”；C正确：胰岛素注射装置应专人专用，针头及注射器一次性使用；D正确：胰岛素注射前应双人核对注射剂量；E正确：未启封胰岛素应2℃-8℃保存，已启封应15℃-30℃室温保存且有效期30天。本题综合考察T/CNAS 21-2021中多个核心考点。","knowledgePoints":[]},{"id":88,"type":"多选题","source":"标准8《胰岛素皮下注射》- 剂量核对、储存要求、注射时间（提示词核心考点；原文页码未提供）","question":"关于胰岛素皮下注射的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"胰岛素注射前应双人核对注射剂量"},{"label":"B","text":"未启封胰岛素应2℃-8℃保存，已启封应15℃-30℃室温保存且有效期30天"},{"label":"C","text":"短效或预混胰岛素宜餐前15-30分钟注射"},{"label":"D","text":"胰岛素剂量可由患者自行估算"},{"label":"E","text":"未启封胰岛素可高温保存"}],"answer":"ABC","analysis":"A正确：胰岛素注射前应双人核对注射剂量；B正确：未启封胰岛素应2℃-8℃保存，已启封应15℃-30℃室温保存且有效期30天；C正确：短效或预混胰岛素宜餐前15-30分钟注射；D错误：胰岛素剂量可由患者自行估算不符合标准；正确依据应为“胰岛素注射前应双人核对注射剂量”；E错误：未启封胰岛素可高温保存不符合标准；正确依据应为“未启封胰岛素应2℃-8℃保存，已启封应15℃-30℃室温保存且有效期30天”。本题综合考察T/CNAS 21-2021中多个核心考点。","knowledgePoints":[]},{"id":89,"type":"多选题","source":"标准9《病区护理人文关怀管理规范》- 发布机构、标准地位、核心内容（提示词核心考点；原文页码未提供）","question":"关于病区护理人文关怀管理规范的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"该标准由中国生命关怀协会发布"},{"label":"B","text":"该标准为我国人文护理领域首部团体标准"},{"label":"C","text":"标准包括基本要求、人文素养与培训、制度流程、环境设施、关怀程序措施和质量改进"},{"label":"D","text":"该标准由个人科室自行发布"},{"label":"E","text":"该标准不是人文护理领域标准"}],"answer":"ABC","analysis":"A正确：该标准由中国生命关怀协会发布；B正确：该标准为我国人文护理领域首部团体标准；C正确：标准包括基本要求、人文素养与培训、制度流程、环境设施、关怀程序措施和质量改进；D错误：该标准由个人科室自行发布不符合标准；正确依据应为“该标准由中国生命关怀协会发布”；E错误：该标准不是人文护理领域标准不符合标准；正确依据应为“该标准为我国人文护理领域首部团体标准”。本题综合考察T/CALC 001-2022中多个核心考点。","knowledgePoints":[]},{"id":90,"type":"多选题","source":"标准10《老年人误吸的预防》- 动态评估、高危人群、隐性误吸（提示词核心考点；原文页码未提供）","question":"关于老年人误吸的预防的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"误吸史、意识障碍、长期卧床和留置人工气道者属于误吸高危人群"},{"label":"B","text":"隐性误吸可行VFSS检查"},{"label":"C","text":"只在出院后评估误吸风险"},{"label":"D","text":"误吸史不是风险因素"},{"label":"E","text":"老年人误吸风险应在入院时及病情变化时动态评估"}],"answer":"ABE","analysis":"A正确：误吸史、意识障碍、长期卧床和留置人工气道者属于误吸高危人群；B正确：隐性误吸可行VFSS检查；C错误：只在出院后评估误吸风险不符合标准；正确依据应为“老年人误吸风险应在入院时及病情变化时动态评估”；D错误：误吸史不是风险因素不符合标准；正确依据应为“误吸史、意识障碍、 栓袜压力为15-21mmHg"},{"label":"D","text":"卧床患者间歇充气加压装置每天使用≥18小时"},{"label":"E","text":"每日饮水越少越好"}],"answer":"BCD","analysis":"A错误：抗血栓袜无需压力不符合标准；正确依据应为“抗血栓袜压力为15-21mmHg”；B正确：VTE基础预防可包括每日饮水1500-2500ml；C正确：抗血栓袜压力为15-21mmHg；D正确：卧床患者间歇充气加压装置每天使用≥18小时；E错误：每日饮水越少越好不符合标准；正确依据应为“VTE基础预防可包括每日饮水1500-2500ml”。本题综合考察T/CNAS 28-2023中多个核心考点。","knowledgePoints":[]},{"id":98,"type":"多选题","source":"标准14《门诊患者人文关怀管理规范》- 发布机构、核心内容、适用范围（提示词核心考点；原文页码未提供）","question":"关于门诊患者人文关怀管理规范的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"不涉及质量管理"},{"label":"B","text":"门诊患者人文关怀管理规范由中国生命关怀协会发布"},{"label":"C","text":"标准包括基本要求、人员素质职责、关怀环境设施、流程措施和质量管理五大内容"},{"label":"D","text":"该标准适用于各级各类医院门诊患者人文关怀管理实践"},{"label":"E","text":"由个人诊室自行发布"}],"answer":"BCD","analysis":"A错误：不涉及质量管理不符合标准；正确依据应为“标准包括基本要求、人员素质职责、关怀环境设施、流程措施和质量管理五大内容”；B正确：门诊患者人文关怀管理规范由中国生命关怀协会发布；C正确：标准包括基本要求、人员素质职责、关怀环境设施、流程措施和质量管理五大内容；D正确：该标准适用于各级各类医院门诊患者人文关怀管理实践；E错误：由个人诊室自行发布不符合标准；正确依据应为“门诊患者人文关怀管理规范由中国生命关怀协会发布”。本题综合考察T/CALC 002-2023中多个核心考点。","knowledgePoints":[]},{"id":99,"type":"多选题","source":"标准15《成人手术后疼痛评估与护理》- 评估工具、评估内容、评估时机（提示词核心考点；原文页码未提供）","question":"关于成人手术后疼痛评估与护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"成人手术后疼痛评估推荐使用FAS-R"},{"label":"B","text":"疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状"},{"label":"C","text":"术后疼痛应在转科交接时、每天至少一次和出院时评估"},{"label":"D","text":"推荐使用Morse量表评估疼痛"},{"label":"E","text":"只询问是否想出院"}],"answer":"ABC","analysis":"A正确：成人手术后疼痛评估推荐使用FAS-R；B正确：疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状；C正确：术后疼痛应在转科交接时、每天至少一次和出院时评估；D错误：推荐使用Morse量表评估疼痛不符合标准；正确依据应为“成人手术后疼痛评估推荐使用FAS-R”；E错误：只询问是否想出院不符合标准；正确依据应为“疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状”。本题综合考察T/CNAS 39-2023中多个核心考点。","knowledgePoints":[]},{"id":100,"type":"多选题","source":"标准15《成人手术后疼痛评估与护理》- 评估内容、评估时机、复评时间（提示词核心考点；原文页码未提供）","question":"关于成人手术后疼痛评估与护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"静脉给药后5-15分钟应动态复评疼痛"},{"label":"B","text":"只评估体温"},{"label":"C","text":"出院时无需评估"},{"label":"D","text":"疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状"},{"label":"E","text":"术后疼痛应在转科交接时、每天至少一次和出院时评估"}],"answer":"ADE","analysis":"A正确：静脉给药后5-15分钟应动态复评疼痛；B错误：只评估体温不符合标准；正确依据应为“疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状”；C错误：出院时无需评估不符合标准；正确依据应为“术后疼痛应在转科交接时、每天至少一次和出院时评估”；D正确：疼痛评估包括筛查、部位、强度、性质、持续时间及伴随症状；E正确：术后疼痛应在转科交接时、每天至少一次和出院时评估。本题综合考察T/CNAS 39-2023中多个核心考点。","knowledgePoints":[]},{"id":101,"type":"多选题","source":"标准16《成人呼吸支持治疗器械相关压力性损伤的预防》- 适用范围、风险因素、评估频次（提示词核心考点；原文页码未提供）","question":"关于成人呼吸支持治疗器械相关压力性损伤的预防的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"皮肤和组织评估至少每日2次"},{"label":"B","text":"只适用于口服给药"},{"label":"C","text":"低氧合可降低风险"},{"label":"D","text":"标准适用于氧气吸入、高流量氧疗、无创机械通气和有创机械通气相关器械"},{"label":"E","text":"患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险"}],"answer":"ADE","analysis":"A正确：皮肤和组织评估至少每日2次；B错误：只适用于口服给药不符合标准；正确依据应为“标准适用于氧气吸入、高流量氧疗、无创机械通气和有创机械通气相关器械”；C错误：低氧合可降低风险不符合标准；正确依据应为“患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险”；D正确：标准适用于氧气吸入、高流量氧疗、无创机械通气和有创机械通气相关器械；E正确：患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险。本题综合考察T/CNAS 34-2023中多个核心考点。","knowledgePoints":[]},{"id":102,"type":"多选题","source":"标准16《成人呼吸支持治疗器械相关压力性损伤的预防》- 风险因素、评估频次、气囊压力（提示词核心考点；原文页码未提供）","question":"关于成人呼吸支持治疗器械相关压力性损伤的预防的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"无需评估皮肤"},{"label":"B","text":"患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险"},{"label":"C","text":"皮肤和组织评估至少每日2次"},{"label":"D","text":"气管插管气囊压力宜保持25-30cmH₂O"},{"label":"E","text":"风险与患者状态无关"}],"answer":"BCD","analysis":"A错误：无需评估皮肤不符合标准；正确依据应为“皮肤和组织评估至少每日2次”；B正确：患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险；C正确：皮肤和组织评估至少每日2次；D正确：气管插管气囊压力宜保持25-30cmH₂O；E错误：风险与患者状态无关不符合标准；正确依据应为“患者消瘦或肥胖、低氧合低灌注、躁动和移动受限均可增加风险”。本题综合考察T/CNAS 34-2023中多个核心考点。","knowledgePoints":[]},{"id":103,"type":"多选题","source":"标准17《成人失禁相关性皮炎的预防与护理》- PAT评估、风险分级、IAD分类（提示词核心考点；原文页码未提供）","question":"关于成人失禁相关性皮炎的预防与护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"PAT 4-6分为高风险"},{"label":"B","text":"会阴部皮肤状况评估量表PAT总分4-12分"},{"label":"C","text":"PAT 4-6分为低风险，7-12分为高风险"},{"label":"D","text":"IAD分类工具中0级为无IAD，1级轻度，2级中重度"},{"label":"E","text":"PAT总分为0-3分"}],"answer":"BCD","analysis":"A错误：PAT 4-6分为高风险不符合标准；正确依据应为“PAT 4-6分为低风险，7-12分为高风险”；B正确：会阴部皮肤状况评估量表PAT总分4-12分；C正确：PAT 4-6分为低风险，7-12分为高风险；D正确：IAD分类工具中0级为无IAD，1级轻度，2级中重度；E错误：PAT总分为0-3分不符合标准；正确依据应为“会阴部皮肤状况评估量表PAT总分4-12分”。本题综合考察T/CNAS 35-2023中多个核心考点。","knowledgePoints":[]},{"id":104,"type":"多选题","source":"标准17《成人失禁相关性皮炎的预防与护理》- 风险分级、IAD分类、清洁原则（提示词核心考点；原文页码未提供）","question":"关于成人失禁相关性皮炎的预防与护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"IAD分类工具中0级为无IAD，1级轻度，2级中重度"},{"label":"B","text":"预防IAD宜使用温和弱酸性或中性清洗液，并用柔软工具按压式清洁"},{"label":"C","text":"PAT 7-12分为无风险"},{"label":"D","text":"2级为无IAD"},{"label":"E","text":"PAT 4-6分为低风险，7-12分为高风险"}],"answer":"ABE","analysis":"A正确：IAD分类工具中0级为无IAD，1级轻度，2级中重度；B正确：预防IAD宜使用温和弱酸性或中性清洗液，并用柔软工具按压式清洁；C错误：PAT 7-12分为无风险不符合标准；正确依据应为“PAT 4-6分为低风险，7-12分为高风险”；D错误：2级为无IAD不符合标准；正确依据应为“IAD分类工具中0级为无IAD，1级轻度，2级中重度”；E正确：PAT 4-6分为低风险，7-12分为高风险。本题综合考察T/CNAS 35-2023中多个核心考点。","knowledgePoints":[]},{"id":105,"type":"多选题","source":"标准18《气道净化护理》- 适应证、咳嗽峰流速、禁忌证（提示词核心考点；原文页码未提供）","question":"关于气道净化护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"咳嗽峰流速<270L/min提示气道净化需求"},{"label":"B","text":"颅内压>20mmHg属于气道净化禁忌证之一"},{"label":"C","text":"痰量越多越禁止净化"},{"label":"D","text":"咳嗽峰流速不需评估"},{"label":"E","text":"痰量>30ml/d或痰量骤减且不能充分排出可考虑气道净化"}],"answer":"ABE","analysis":"A正确：咳嗽峰流速<270L/min提示气道净化需求；B正确：颅内压>20mmHg属于气道净化禁忌证之一；C错误：痰量越多越禁止净化不符合标准；正确依据应为“痰量>30ml/d或痰量骤减且不能充分排出可考虑气道净化”；D错误：咳嗽峰流速不需评估不符合标准；正确依据应为“咳嗽峰流速<270L/min提示气道净化需求”；E正确：痰量>30ml/d或痰量骤减且不能充分排出可考虑气道净化。本题综合考察T/CNAS 37-2023中多个核心考点。","knowledgePoints":[]},{"id":106,"type":"多选题","source":"标准18《气道净化护理》- 咳嗽峰流速、禁忌证、治疗时机（提示词核心考点；原文页码未提供）","question":"关于气道净化护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"咳嗽峰流速>500L/min提示必须净化"},{"label":"B","text":"活动性出血不是禁忌"},{"label":"C","text":"咳嗽峰流速<270L/min提示气道净化需求"},{"label":"D","text":"颅内压>20mmHg属于气道净化禁忌证之一"},{"label":"E","text":"气道净化宜在餐前或餐后1-2小时进行"}],"answer":"CDE","analysis":"A错误：咳嗽峰流速>500L/min提示必须净化不符合标准；正确依据应为“咳嗽峰流速<270L/min提示气道净化需求”；B错误：活动性出血不是禁忌不符合标准；正确依据应为“颅内压>20mmHg属于气道净化禁忌证之一”；C正确：咳嗽峰流速<270L/min提示气道净化需求；D正确：颅内压>20mmHg属于气道净化禁忌证之一；E正确：气道净化宜在餐前或餐后1-2小时进行。本题综合考察T/CNAS 37-2023中多个核心考点。","knowledgePoints":[]},{"id":107,"type":"多选题","source":"标准19《脑卒中后吞咽障碍患者进食护理》- EAT-10、洼田试验、营养筛查（提示词核心考点；原文页码未提供）","question":"关于脑卒中后吞咽障碍患者进食护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"EAT-10总分0分提示严重问题"},{"label":"B","text":"洼田试验不用于吞咽筛查"},{"label":"C","text":"EAT-10总分≥3分提示吞咽问题"},{"label":"D","text":"改良洼田饮水试验采用1-5级分级"},{"label":"E","text":"脑卒中后吞咽障碍患者可用NRS2002进行营养风险筛查"}],"answer":"CDE","analysis":"A错误：EAT-10总分0分提示严重问题不符合标准；正确依据应为“EAT-10总分≥3分提示吞咽问题”；B错误：洼田试验不用于吞咽筛查不符合标准；正确依据应为“改良洼田饮水试验采用1-5级分级”；C正确：EAT-10总分≥3分提示吞咽问题；D正确：改良洼田饮水试验采用1-5级分级；E正确：脑卒中后吞咽障碍患者可用NRS2002进行营养风险筛查。本题综合考察T/CNAS 40-2023中多个核心考点。","knowledgePoints":[]},{"id":108,"type":"多选题","source":"标准20《医疗机构药事管理与药学服务-抢救车管理》- 发布机构、三大模块、统一目录布局（提示词核心考点；原文页码未提供）","question":"关于医疗机构药事管理与药学服务-抢救车管理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"不包括质量评价"},{"label":"B","text":"抢救车管理标准由中国医院协会发布"},{"label":"C","text":"抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块"},{"label":"D","text":"抢救车应全院统一目录与布局，不得按个人习惯调整"},{"label":"E","text":"由个人病区自行发布"}],"answer":"BCD","analysis":"A错误：不包括质量评价不符合标准；正确依据应为“抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块”；B正确：抢救车管理标准由中国医院协会发布；C正确：抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块；D正确：抢救车应全院统一目录与布局，不得按个人习惯调整；E错误：由个人病区自行发布不符合标准；正确依据应为“抢救车管理标准由中国医院协会发布”。本题综合考察T/CHAS 20-3-7-3-2024中多个核心考点。","knowledgePoints":[]},{"id":109,"type":"多选题","source":"标准20《医疗机构药事管理与药学服务-抢救车管理》- 三大模块、统一目录布局、锁扣管理（提示词核心考点；原文页码未提供）","question":"关于医疗机构药事管理与药学服务-抢救车管理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"抢救车应全院统一目录与布局，不得按个人习惯调整"},{"label":"B","text":"抢救车可采用封条或一次性锁扣管理"},{"label":"C","text":"只包括药品价格管理"},{"label":"D","text":"每班可重新设计布局"},{"label":"E","text":"抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块"}],"answer":"ABE","analysis":"A正确：抢救车应全院统一目录与布局，不得按个人习惯调整；B正确：抢救车可采用封条或一次性锁扣管理；C错误：只包括药品价格管理不符合标准；正确依据应为“抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块”；D错误：每班可重新设计布局不符合标准；正确依据应为“抢救车应全院统一目录与布局，不得按个人习惯调整”；E正确：抢救车管理包括基本要求、管理过程、质量管理与评价改进三大模块。本题综合考察T/CHAS 20-3-7-3-2024中多个核心考点。","knowledgePoints":[]},{"id":110,"type":"多选题","source":"标准21《针刺伤预防与处理》- 定义、环境预防、安全器具（提示词核心考点；原文页码未提供）","question":"关于针刺伤预防与处理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离"},{"label":"B","text":"宜选用安全型采血针、留置针、自动回缩注射器和无针系统"},{"label":"C","text":"针刺伤只指纸张割伤"},{"label":"D","text":"光线不足不影响针刺伤"},{"label":"E","text":"针刺伤是由注射针头、缝合针、穿刺针等医疗锐器造成的皮肤损伤"}],"answer":"ABE","analysis":"A正确：预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离；B正确：宜选用安全型采血针、留置针、自动回缩注射器和无针系统；C错误：针刺伤只指纸张割伤不符合标准；正确依据应为“针刺伤是由注射针头、缝合针、穿刺针等医疗锐器造成的皮肤损伤”；D错误：光线不足不影响针刺伤不符合标准；正确依据应为“预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离”；E正确：针刺伤是由注射针头、缝合针、穿刺针等医疗锐器造成的皮肤损伤。本题综合考察T/CNAS 41-2024中多个核心考点。","knowledgePoints":[]},{"id":111,"type":"多选题","source":"标准21《针刺伤预防与处理》- 环境预防、安全器具、回套针帽（提示词核心考点；原文页码未提供）","question":"关于针刺伤预防与处理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"环境越拥挤越安全"},{"label":"B","text":"禁止使用安全型器具"},{"label":"C","text":"预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离"},{"label":"D","text":"宜选用安全型采血针、留置针、自动回缩注射器和无针系统"},{"label":"E","text":"应避免回套针帽，必须回套时采用单手操作"}],"answer":"CDE","analysis":"A错误：环境越拥挤越安全不符合标准；正确依据应为“预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离”；B错误：禁止使用安全型器具不符合标准；正确依据应为“宜选用安全型采血针、留置针、自动回缩注射器和无针系统”；C正确：预防针刺伤应保证光线充足、操作台面宽敞、物品有序和安全距离；D正确：宜选用安全型采血针、留置针、自动回缩注射器和无针系统；E正确：应避免回套针帽，必须回套时采用单手操作。本题综合考察T/CNAS 41-2024中多个核心考点。","knowledgePoints":[]},{"id":112,"type":"多选题","source":"标准22《成人留置导尿的护理及并发症处理》- 留置原则、每日评估、导管选择（提示词核心考点；原文页码未提供）","question":"关于成人留置导尿的护理及并发症处理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"留置导尿应作为所有患者首选"},{"label":"B","text":"每月评估一次即可"},{"label":"C","text":"仅在间歇导尿不适用、诱导导尿无效时才考虑留置导尿"},{"label":"D","text":"应每日评估导尿管留置必要性"},{"label":"E","text":"导尿管应选择满足需求的最小管径，长期留置>14天宜使用硅胶导尿管"}],"answer":"CDE","analysis":"A错误：留置导尿应作为所有患者首选不符合标准；正确依据应为“仅在间歇导尿不适用、诱导导尿无效时才考虑留置导尿”；B错误：每月评估一次即可不符合标准；正确依据应为“应每日评估导尿管留置必要性”；C正确：仅在间歇导尿不适用、诱导导尿无效时才考虑留置导尿；D正确：应每日评估导尿管留置必要性；E正确：导尿管应选择满足需求的最小管径，长期留置>14天宜使用硅胶导尿管。本题综合考察T/CNAS 48-2025中多个核心考点。","knowledgePoints":[]},{"id":113,"type":"多选题","source":"标准22《成人留置导尿的护理及并发症处理》- 每日评估、导管选择、球囊注水（提示词核心考点；原文页码未提供）","question":"关于成人留置导尿的护理及并发症处理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"应每日评估导尿管留置必要性"},{"label":"B","text":"导尿管应选择满足需求的最小管径，长期留置>14天宜使用硅胶导尿管"},{"label":"C","text":"球囊宜注入5-15ml无菌注射用水"},{"label":"D","text":"留置后无需再评估"},{"label":"E","text":"长期留置不考虑材质"}],"answer":"ABC","analysis":"A正确：应每日评估导尿管留置必要性；B正确：导尿管应选择满足需求的最小管径，长期留置>14天宜使用硅胶导尿管；C正确：球囊宜注入5-15ml无菌注射用水；D错误：留置后无需再评估不符合标准；正确依据应为“应每日评估导尿管留置必要性”；E错误：长期留置不考虑材质不符合标准；正确依据应为“导尿管应选择满足需求的最小管径，长期留置>14天宜使用硅胶导尿管”。本题综合考察T/CNAS 48-2025中多个核心考点。","knowledgePoints":[]},{"id":114,"type":"多选题","source":"标准23《抗肿瘤药物静脉给药技术》- 医嘱核对、身份查对、通路选择（提示词核心考点；原文页码未提供）","question":"关于抗肿瘤药物静脉给药技术的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"抗肿瘤药物给药前应双人核对医嘱，包括药名、规格、剂量、途径、速度和顺序"},{"label":"B","text":"给药前应采用两种及以上方式查对患者身份"},{"label":"C","text":"应根据病情、治疗方案和药物性质选择血管通路"},{"label":"D","text":"仅一人凭记忆给药"},{"label":"E","text":"无需患者身份核对"}],"answer":"ABC","analysis":"A正确：抗肿瘤药物给药前应双人核对医嘱，包括药名、规格、剂量、途径、速度和顺序；B正确：给药前应采用两种及以上方式查对患者身份；C正确：应根据病情、治疗方案和药物性质选择血管通路；D错误：仅一人凭记忆给药不符合标准；正确依据应为“抗肿瘤药物给药前应双人核对医嘱，包括药名、规格、剂量、途径、速度和顺序”；E错误：无需患者身份核对不符合标准；正确依据应为“给药前应采用两种及以上方式查对患者身份”。本题综合考察T/CNAS 53-2025中多个核心考点。","knowledgePoints":[]},{"id":115,"type":"多选题","source":"标准24《成人患者医用粘胶相关性皮肤损伤的预防及护理》- MARSI分类、评估时机、高风险人群（提示词核心考点；原文页码未提供）","question":"关于成人患者医用粘胶相关性皮肤损伤的预防及护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估"},{"label":"B","text":"年龄≥65岁、糖尿病、皮肤过敏史、局部皮肤持续潮湿和放射治疗者属于高风险人群"},{"label":"C","text":"MARSI只包括跌倒"},{"label":"D","text":"患者不适时无需评估"},{"label":"E","text":"MARSI包括机械性损伤、皮炎、浸渍和毛囊炎四种类型"}],"answer":"ABE","analysis":"A正确：首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估；B正确：年龄≥65岁、糖尿病、皮肤过敏史、局部皮肤持续潮湿和放射治疗者属于高风险人群；C错误：MARSI只包括跌倒不符合标准；正确依据应为“MARSI包括机械性损伤、皮炎、浸渍和毛囊炎四种类型”；D错误：患者不适时无需评估不符合标准；正确依据应为“首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估”；E正确：MARSI包括机械性损伤、皮炎、浸渍和毛囊炎四种类型。本题综合考察T/CNAS 51-2025中多个核心考点。","knowledgePoints":[]},{"id":116,"type":"多选题","source":"标准24《成人患者医用粘胶相关性皮肤损伤的预防及护理》- 评估时机、高风险人群、强化防护（提示词核心考点；原文页码未提供）","question":"关于成人患者医用粘胶相关性皮肤损伤的预防及护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"只在出院后评估"},{"label":"B","text":"糖尿病与MARSI无关"},{"label":"C","text":"首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估"},{"label":"D","text":"年龄≥65岁、糖尿病、皮肤过敏史、局部皮肤持续潮湿和放射治疗者属于高风险人群"},{"label":"E","text":"高风险患者宜优先选用硅胶类低致敏产品"}],"answer":"CDE","analysis":"A错误：只在出院后评估不符合标准；正确依据应为“首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估”；B错误：糖尿病与MARSI无关不符合标准；正确依据应为“年龄≥65岁、糖尿病、皮肤过敏史、局部皮肤持续潮湿和放射治疗者属于高风险人群”；C正确：首次使用粘胶产品前、更换或移除时、患者主诉不适时应进行评估；D正确：年龄≥65岁、糖尿病、皮肤过敏史、局部皮肤持续潮湿和放射治疗者属于高风险人群；E正确：高风险患者宜优先选用硅胶类低致敏产品。本题综合考察T/CNAS 51-2025中多个核心考点。","knowledgePoints":[]},{"id":117,"type":"多选题","source":"标准25《成人吞咽障碍患者口服给药护理》- 误吸识别、安全一口量、服药量限制（提示词核心考点；原文页码未提供）","question":"关于成人吞咽障碍患者口服给药护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"误吸症状可忽略"},{"label":"B","text":"安全一口量无需评估"},{"label":"C","text":"口服给药护理应识别误吸症状并及时处理"},{"label":"D","text":"应基于吞咽评估确定安全一口量和药物适宜黏稠度"},{"label":"E","text":"每次服药量不应超过安全一口量"}],"answer":"CDE","analysis":"A错误：误吸症状可忽略不符合标准；正确依据应为“口服给药护理应识别误吸症状并及时处理”；B错误：安全一口量无需评估不符合标准；正确依据应为“应基于吞咽评估确定安全一口量和药物适宜黏稠度”；C正确：口服给药护理应识别误吸症状并及时处理；D正确：应基于吞咽评估确定安全一口量和药物适宜黏稠度；E正确：每次服药量不应超过安全一口量。本题综合考察T/CNAS 50-2025中多个核心考点。","knowledgePoints":[]},{"id":118,"type":"多选题","source":"标准25《成人吞咽障碍患者口服给药护理》- 安全一口量、服药量限制、VVST-CV（提示词核心考点；原文页码未提供）","question":"关于成人吞咽障碍患者口服给药护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"应基于吞咽评估确定安全一口量和药物适宜黏稠度"},{"label":"B","text":"每次服药量不应超过安全一口量"},{"label":"C","text":"改良洼田饮水试验筛查异常者可进一步行改良容积-黏度吞咽测试"},{"label":"D","text":"每次服药量越大越好"},{"label":"E","text":"安全一口量只用于饮水"}],"answer":"ABC","analysis":"A正确：应基于吞咽评估确定安全一口量和药物适宜黏稠度；B正确：每次服药量不应超过安全一口量；C正确：改良洼田饮水试验筛查异常者可进一步行改良容积-黏度吞咽测试；D错误：每次服药量越大越好不符合标准；正确依据应为“应基于吞咽评估确定安全一口量和药物适宜黏稠度”；E错误：安全一口量只用于饮水不符合标准；正确依据应为“每次服药量不应超过安全一口量”。本题综合考察T/CNAS 50-2025中多个核心考点。","knowledgePoints":[]},{"id":119,"type":"多选题","source":"标准26《无创正压通气护理技术》- 体位、连接器选择、压力设置（提示词核心考点；原文页码未提供）","question":"关于无创正压通气护理技术的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"无创正压通气时宜抬高床头30°-45°"},{"label":"B","text":"稳定期首选鼻罩，急性缺氧或张口呼吸可选口鼻罩"},{"label":"C","text":"CPAP初始压力宜4-5cmH₂O，BIPAP吸气压力8-10cmH₂O、呼气压力4-5cmH₂O"},{"label":"D","text":"所有患者必须平卧"},{"label":"E","text":"急性缺氧只能鼻导管"}],"answer":"ABC","analysis":"A正确：无创正压通气时宜抬高床头30°-45°；B正确：稳定期首选鼻罩，急性缺氧或张口呼吸可选口鼻罩；C正确：CPAP初始压力宜4-5cmH₂O，BIPAP吸气压力8-10cmH₂O、呼气压力4-5cmH₂O；D错误：所有患者必须平卧不符合标准；正确依据应为“无创正压通气时宜抬高床头30°-45°”；E错误：急性缺氧只能鼻导管不符合标准；正确依据应为“稳定期首选鼻罩，急性缺氧或张口呼吸可选口鼻罩”。本题综合考察T/CNAS 47-2025中多个核心考点。","knowledgePoints":[]},{"id":120,"type":"多选题","source":"标准27《成人泌尿造口护理》- 核心内容、适用范围、牵头单位（提示词核心考点；原文页码未提供）","question":"关于成人泌尿造口护理的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"该标准适用于各级各类医疗机构注册护士"},{"label":"B","text":"成人泌尿造口护理标准牵头单位为北京大学第三医院"},{"label":"C","text":"只包括药品效期管理"},{"label":"D","text":"不适用于注册护士"},{"label":"E","text":"成人泌尿造口护理包括操作规范、并发症识别与护理、健康指导三大核心内容"}],"answer":"ABE","analysis":"A正确：该标准适用于各级各类医疗机构注册护士；B正确：成人泌尿造口护理标准牵头单位为北京大学第三医院；C错误：只包括药品效期管理不符合标准；正确依据应为“成人泌尿造口护理包括操作规范、并发症识别与护理、健康指导三大核心内容”；D错误：不适用于注册护士不符合标准；正确依据应为“该标准适用于各级各类医疗机构注册护士”；E正确：成人泌尿造口护理包括操作规范、并发症识别与护理、健康指导三大核心内容。本题综合考察T/CNAS 49-2025中多个核心考点。","knowledgePoints":[]},{"id":121,"type":"判断题","source":"标准5《成人住院患者跌倒风险评估及预防》- 临床高风险（提示词核心考点；原文页码未提供）","question":"年龄≥80岁属于跌倒高风险判定条件之一","options":[],"answer":"正确","analysis":"该表述符合T/CNAS 18-2020关于“临床高风险”的要求。","knowledgePoints":[]},{"id":122,"type":"判断题","source":"标准5《成人住院患者跌倒风险评估及预防》- Morse分级（提示词核心考点；原文页码未提供）","question":"Morse跌倒评估量表＞45分为高风险","options":[],"answer":"正确","analysis":"该表述符合T/CNAS 18-2020关于“Morse分级”的要求。","knowledgePoints":[]},{"id":123,"type":"判断题","source":"标准6《成人鼻肠管的留置与维护》- 测量长度（提示词核心考点；原文页码未提供）","question":"置管长度测量可采用鼻尖-耳垂-剑突下缘","options":[],"answer":"正确","analysis":"该表述符合T/CNAS 20-2021关于“测量长度”的要求。","knowledgePoints":[]},{"id":124,"type":"判断题","source":"标准6《成人鼻肠管的留置与维护》- 位置确认（提示词核心考点；原文页码未提供）","question":"置管后应通过pH检测和X光片确认位置","options":[],"answer":"正确","analysis":"该表述符合T/CNAS 20-2021关于“位置确认”的要求。","knowledgePoints":[]},{"id":125,"type":"判断题","source":"标准7《血管活性药物静脉输注护理》- 标签标识（提示词核心考点；原文页码未提供）","question":"标签应注明患者姓名、床号、药名、剂量、配置时间和输注速度","options":[],"answer":"正确","analysis":"该表述符合T/CNAS 22-2021关于“标签标识”的要求。","knowledgePoints":[]},{"id":126,"type":"判断题","source":"标准7《血管活性药物静脉输注护理》- 双泵法（提示词核心考点；原文页码未提供）","question":"体外循环手术、大剂量   gr: [{"id":1,"type":"单选题","source":"标准1《护理分级标准》- 护理分级依据（提示词核心考点；原文页码未提供）","question":"关于护理分级标准中“护理分级依据”的要求，下列哪项正确？","options":[{"label":"A","text":"仅根据床位等级确定护理级别"},{"label":"B","text":"护理级别入院后固定不再调整"},{"label":"C","text":"护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定"},{"label":"D","text":"仅根据患者年龄确定护理级别"}],"answer":"C","analysis":"A错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定”。；B错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定”。；C正确：护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定；D错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定”。。本题考察WS/T 431-2023中“护理分级依据”的核心要求。","knowledgePoints":[]},{"id":2,"type":"单选题","source":"标准1《护理分级标准》- 动态调整（提示词核心考点；原文页码未提供）","question":"关于护理分级标准中“动态调整”的要求，下列哪项正确？","options":[{"label":"A","text":"护理级别应根据患者病情和自理能力变化进行动态调整"},{"label":"B","text":"护理级别一经确定不得变更"},{"label":"C","text":"只在出院前调整护理级别"},{"label":"D","text":"只由患者家属决定护理级别"}],"answer":"A","analysis":"A正确：护理级别应根据患者病情和自理能力变化进行动态调整；B错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情和自理能力变化进行动态调整”。；C错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情和自理能力变化进行动态调整”。；D错误：该表述与标准要求不符。本题对应的正确要求是“护理级别应根据患者病情和自理能力变化进行动态调整”。。本题考察WS/T 431-2023中“动态调整”的核心要求。","knowledgePoints":[]},{"id":3,"type":"单选题","source":"标准1《护理分级标准》- 特级护理对象（提示词核心考点；原文页码未提供）","question":"关于护理分级标准中“特级护理对象”的要求，下列哪项正确？","options":[{"label":"A","text":"仅轻度依赖患者均需特级护理"},{"label":"B","text":"门诊复查患者均需特级护理"},{"label":"C","text":"病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理"},{"label":"D","text":"病情稳定且生活完全自理者应确定为特级护理"}],"answer":"C","analysis":"A错误：该表述与标准要求不符。本题对应的正确要求是“病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理”。；B错误：该表述与标准要求不符。本题对应的正确要求是“病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理”。；C正确：病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理；D错误：该表述与标准要求不符。本题对应的正确要求是“病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理”。。本题考察WS/T 431-2023中“特级护理对象”的核心要求。","knowledgePoints":[]},{"id":4,"type":"单选题","source":"标准1《护理分级标准》- 一级护理对象（提示词核心考点；原文页码未提供）","question":"关于护理分级标准中“一级护理对象”的要求，下列哪项正确？","options":[{"label":"A","text":"病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理"},{"label":"B","text":"自理能力无依赖者必须一级护理"},{"label":"C","text":"一级护理仅适用于康复期患者"},{"label" 科室、日期和废物类别"},{"label":"D","text":"医疗废物袋满后可继续压实"}],"answer":"C","analysis":"A错误：该表述与标准要求不符。本题对应的正确要求是“医疗废物袋满3/4时应封口，并注明产生科室、日期和废物类别”。；B错误：该表述与标准要求不符。本题对应的正确要求是“医疗废物袋满3/4时应封口，并注明产生科室、日期和废物类别”。；C正确：医疗废物袋满3/4时应封口，并注明产生科室、日期和废物类别；D错误：该表述与标准要求不符。本题对应的正确要求是“医疗废物袋满3/4时应封口，并注明产生科室、日期和废物类别”。。本题考察WS/T 856-2025中“医疗废物”的核心要求。","knowledgePoints":[]},{"id":78,"type":"单选题","source":"标准4《安全注射标准》- 针刺伤处置（提示词核心考点；原文页码未提供）","question":"关于安全注射标准中“针刺伤处置”的要求，下列哪项正确？","options":[{"label":"A","text":"针刺伤后应立即移除锐器、由近心端向远心端挤压、冲洗、消毒并必要时包扎"},{"label":"B","text":"针刺伤后应立即用力吮吸伤口"},{"label":"C","text":"针刺伤无需报告"},{"label":"D","text":"针刺伤后只贴创可贴即可"}],"answer":"A","analysis":"A正确：针刺伤后应立即移除锐器、由近心端向远心端挤压、冲洗、消毒并必要时包扎；B错误：该表述与标准要求不符。本题对应的正确要求是“针刺伤后应立即移除锐器、由近心端向远心端挤压、冲洗、消毒并必要时包扎”。；C错误：该表述与标准要求不符。本题对应的正确要求是“针刺伤后应立即移除锐器、由近心端向远心端挤压、冲洗、消毒并必要时包扎”。；D错误：该表述与标准要求不符。本题对应的正确要求是“针刺伤后应立即移除锐器、由近心端向远心端挤压、冲洗、消毒并必要时包扎”。。本题考察WS/T 856-2025中“针刺伤处置”的核心要求。","knowledgePoints":[]},{"id":79,"type":"单选题","source":"标准4《安全注射标准》- 黏膜暴露（提示词核心考点；原文页码未提供）","question":"关于安全注射标准中“黏膜暴露”的要求，下列哪项正确？","options":[{"label":"A","text":"黏膜暴露后用酒精直接冲眼"},{"label":"B","text":"黏膜暴露只需观察"},{"label":"C","text":"黏膜暴露后应用生理盐水或清水反复冲洗"},{"label":"D","text":"黏膜暴露后无需处理"}],"answer":"C","analysis":"A错误：该表述与标准要求不符。本题对应的正确要求是“黏膜暴露后应用生理盐水或清水反复冲洗”。；B错误：该表述与标准要求不符。本题对应的正确要求是“黏膜暴露后应用生理盐水或清水反复冲洗”。；C正确：黏膜暴露后应用生理盐水或清水反复冲洗；D错误：该表述与标准要求不符。本题对应的正确要求是“黏膜暴露后应用生理盐水或清水反复冲洗”。。本题考察WS/T 856-2025中“黏膜暴露”的核心要求。","knowledgePoints":[]},{"id":80,"type":"单选题","source":"标准4《安全注射标准》- 职业暴露报告（提示词核心考点；原文页码未提供）","question":"关于安全注射标准中“职业暴露报告”的要求，下列哪项正确？","options":[{"label":"A","text":"职业暴露应立即报告科室负责人，并在24小时内填写职业暴露报告表"},{"label":"B","text":"职业暴露可一周后再报告"},{"label":"C","text":"职业暴露不需登记"},{"label":"D","text":"只有感染后才需报告"}],"answer":"A","analysis":"A正确：职业暴露应立即报告科室负责人，并在24小时内填写职业暴露报告表；B错误：该表述与标准要求不符。本题对应的正确要求是“职业暴露应立即报告科室负责人，并在24小时内填写职业暴露报告表”。；C错误：该表述与标准要求不符。本题对应的正确要求是“职业暴露应立即报告科室负责人，并在24小时内填写职业暴露报告表”。；D错误：该表述与标准要求不符。本题对应的正确要求是“职业暴露应立即报告科室负责人，并在24小时内填写职业暴露报告表”。。本题考察WS/T 856-2025中“职业暴露报告”的核心要求。","knowledgePoints":[]},{"id":81,"type":"多选题","source":"标准1《护理分级标准》- 护理分级依据、动态调整、特级护理对象（提示词核心考点；原文页码未提供）","question":"关于护理分级标准的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理"},{"label":"B","text":"仅根据患者年龄确定护理级别"},{"label":"C","text":"只在出院前调整护理级别"},{"label":"D","text":"护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定"},{"label":"E","text":"护理级别应根据患者病情和自理能力变化进行动态调整"}],"answer":"ADE","analysis":"A正确：病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理；B错误：仅根据患者年龄确定护理级别不符合标准；正确依据应为“护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定”；C错误：只在出院前调整护理级别不符合标准；正确依据应为“护理级别应根据患者病情和自理能力变化进行动态调整”；D正确：护理级别应根据患者病情严重程度和Barthel指数评定量表总分综合确定；E正确：护理级别应根据患者病情和自理能力变化进行动态调整。本题综合考察WS/T 431-2023中多个核心考点。","knowledgePoints":[]},{"id":82,"type":"多选题","source":"标准1《护理分级标准》- 动态调整、特级护理对象、一级护理对象（提示词核心考点；原文页码未提供）","question":"关于护理分级标准的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"仅轻度依赖患者均需特级护理"},{"label":"B","text":"护理级别应根据患者病情和自理能力变化进行动态调整"},{"label":"C","text":"病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理"},{"label":"D","text":"病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理"},{"label":"E","text":"护理级别一经确定不得变更"}],"answer":"BCD","analysis":"A错误：仅轻度依赖患者均需特级护理不符合标准；正确依据应为“病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理”；B正确：护理级别应根据患者病情和自理能力变化进行动态调整；C正确：病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理；D正确：病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理；E错误：护理级别一经确定不得变更不符合标准；正确依据应为“护理级别应根据患者病情和自理能力变化进行动态调整”。本题综合考察WS/T 431-2023中多个核心考点。","knowledgePoints":[]},{"id":83,"type":"多选题","source":"标准1《护理分级标准》- 特级护理对象、一级护理对象、二级护理对象（提示词核心考点；原文页码未提供）","question":"关于护理分级标准的相关要求，以下说法正确的有：（多选）","options":[{"label":"A","text":"病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理"},{"label":"B","text":"病情稳定仍需卧床或自理能力中度依赖患者可确定为二级护理"},{"label":"C","text":"病情稳定且生活完全自理者应确定为特级护理"},{"label":"D","text":"一级护理仅适用于康复期患者"},{"label":"E","text":"病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理"}],"answer":"ABE","analysis":"A正确：病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理；B正确：病情稳定仍需卧床或自理能力中度依赖患者可确定为二级护理；C错误：病情稳定且生活完全自理者应确定为特级护理不符合标准；正确依据应为“病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理”；D错误：一级护理仅适用于康复期患者不符合标准；正确依据应为“病情趋向稳定的重症患者或自理能力重度依赖患者可确定为一级护理”；E正确：病情危重、随时可能发生病情变化需要抢救的患者可确定为特级护理。本题综合考察WS/T 431-2023中多个核心
